services:
  app:
    build: .
    container_name: chat-app
    ports:
      - "5000:5000"
    depends_on:
      - redis
      - mongo
       
    env_file :
      - .env    

  redis:
    image: redis:latest
    container_name: redis-server
    ports:
      - "6379:6379"

  mongo:
    image: mongo:latest
    container_name: mongo-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db    


volumes:
  mongo_data:      
 