services:
  app:
    build: .
    container_name: chat-app
    ports:
      - "3000:5000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file :
      - .env    

  redis:
    image: redis:latest
    container_name: redis-server
    ports:
      - "6379:6379"
 